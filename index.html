<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reto Hipopotitos 🦛</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Reto 🦛">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6D28D9">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --p1:#6D28D9;--p2:#8B5CF6;--p3:#A78BFA;
    --bg:#F5F3FF;--white:#FFFFFF;
    --text:#18181B;--sub:#71717A;--border:#E4E4E7;
    --gold:#F59E0B;--silver:#9CA3AF;--bronze:#CD7C2F;
  }
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* HEADER */
  .header{
    background:linear-gradient(160deg,#4C1D95 0%,#6D28D9 50%,#8B5CF6 100%);
    padding:40px 24px 28px;text-align:center;position:relative;overflow:hidden;
  }
  .header::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 30% 0%,rgba(255,255,255,.12),transparent 60%);
  }
  .hippo{font-size:64px;line-height:1;margin-bottom:12px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));position:relative}
  .header h1{font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px;position:relative}
  .header .subtitle{color:rgba(255,255,255,.7);font-size:14px;margin-top:6px;font-weight:400;position:relative}
  .countdown{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,.15);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:20px;padding:6px 14px;margin-top:14px;
    color:rgba(255,255,255,.9);font-size:12px;font-weight:500;position:relative;
  }
  .countdown .dot{width:6px;height:6px;border-radius:50%;background:#4ADE80;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* TABS */
  .tabs-wrap{background:linear-gradient(160deg,#5B21B6,#7C3AED);padding:0 16px 20px}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex-shrink:0;border:none;padding:9px 18px;border-radius:24px;
    font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;
    background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);
    -webkit-tap-highlight-color:transparent;
  }
  .tab.active{background:#fff;color:var(--p1);box-shadow:0 2px 12px rgba(0,0,0,.15)}
  .tab:not(.active):active{background:rgba(255,255,255,.2)}

  /* CONTENT */
  .content{padding:20px 16px 40px;max-width:480px;margin:0 auto}
  .view{display:none;animation:fadeUp .25s ease}
  .view.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* LOG BUTTON */
  .log-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    background:linear-gradient(135deg,var(--p1),var(--p2));
    color:white;padding:18px 24px;border-radius:18px;
    font-size:16px;font-weight:700;text-decoration:none;
    box-shadow:0 8px 24px rgba(109,40,217,.35);margin-bottom:20px;
    transition:transform .15s,box-shadow .15s;
    -webkit-tap-highlight-color:transparent;
  }
  .log-btn:active{transform:scale(.97);box-shadow:0 4px 12px rgba(109,40,217,.25)}
  .log-icon{font-size:20px}

  /* SCOREBOARD */
  .card-block{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.06);margin-bottom:16px}
  .block-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.8px;text-transform:uppercase;padding:16px 20px 12px;border-bottom:1px solid var(--border)}

  .player{display:flex;align-items:center;padding:16px 20px;gap:14px;border-bottom:1px solid #FAFAFA;transition:background .15s}
  .player:last-child{border-bottom:none}
  .player:active{background:#FAFAFA}
  .rank-badge{
    width:36px;height:36px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .rank-1{background:#FEF3C7}.rank-2{background:#F3F4F6}.rank-3{background:#FEF2E8}.rank-4{background:#F5F3FF}
  .player-info{flex:1;min-width:0}
  .player-name{font-weight:700;font-size:15px}
  .player-meta{font-size:12px;color:var(--sub);margin-top:2px}
  .player-right{text-align:right}
  .player-pts{font-size:26px;font-weight:800;color:var(--p1);line-height:1}
  .player-pts-label{font-size:11px;color:var(--sub)}

  /* BAR */
  .progress-wrap{padding:0 20px 4px}
  .progress-bar{height:4px;background:#EDE9FE;border-radius:2px;margin:10px 0 14px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--p2),var(--p3));border-radius:2px;transition:width .6s ease}

  /* STAT CARDS */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .stat-card{background:var(--white);border-radius:18px;padding:18px 16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}
  .stat-num{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--p1),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
  .stat-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}

  /* PERSONAL NAME */
  .persona-header{display:flex;align-items:center;gap:14px;padding:18px 20px;background:var(--white);border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.05);margin-bottom:16px}
  .persona-avatar{width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,var(--p1),var(--p2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
  .persona-name{font-size:20px;font-weight:800}
  .persona-sub{font-size:13px;color:var(--sub);margin-top:2px}

  /* TABLE */
  .log-table{width:100%;border-collapse:collapse}
  .log-table th{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;padding:12px 20px;text-align:left;border-bottom:1px solid var(--border)}
  .log-table td{padding:12px 20px;font-size:13px;border-bottom:1px solid #FAFAFA}
  .log-table tr:last-child td{border-bottom:none}
  .pts-pill{display:inline-flex;align-items:center;justify-content:center;background:var(--p1);color:white;border-radius:8px;width:28px;height:24px;font-size:12px;font-weight:700}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--sub)}
  .empty-icon{font-size:40px;margin-bottom:12px}
  .empty p{font-size:14px}

  /* LOADING */
  .loading{text-align:center;padding:48px 20px;color:var(--sub)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{width:28px;height:28px;border:2.5px solid #EDE9FE;border-top-color:var(--p1);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}

  .footer-note{text-align:center;color:var(--sub);font-size:12px;padding-top:8px}
</style>
</head>
<body>

<div class="header">
  <div class="hippo">🦛</div>
  <h1>Reto Hipopotitos</h1>
  <p class="subtitle">1 abr – 26 may 2026 · 8 semanas</p>
  <div class="countdown">
    <span class="dot"></span>
    <span id="countdown-text">Cargando...</span>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" data-view="marcador">🏆 Marcador</button>
    <button class="tab" data-view="arturo">Arturo</button>
    <button class="tab" data-view="melissa">Melissa</button>
    <button class="tab" data-view="majo">Majo</button>
    <button class="tab" data-view="ricky">Ricky</button>
  </div>
</div>

<div class="content">

  <!-- MARCADOR -->
  <div class="view active" id="view-marcador">
    <a class="log-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSdrtS6kJVcXCTSLwpZysF1rinI-y1htqxG53cIUCZ3Hpw1hjg/viewform" target="_blank">
      <span class="log-icon">✏️</span> Loggear mi día de hoy
    </a>
    <div class="card-block">
      <div class="block-title">Clasificación</div>
      <div id="scoreboard-list"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
    </div>
    <p class="footer-note">Actualizado en tiempo real · Clawdio 🦞</p>
  </div>

  <!-- DASHBOARDS -->
  <div class="view" id="view-arturo"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  <div class="view" id="view-melissa"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  <div class="view" id="view-majo"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  <div class="view" id="view-ricky"><div class="loading"><div class="spinner"></div>Cargando...</div></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyXa83GLxZbj35OoaCpEZN-573Bn1Dc9ZoC87ytIwU0pfI2CZd_v-StXmThOC_x75x6Zg/exec";
const MEDALS = ["🥇","🥈","🥉","4️⃣"];
const AVATARS = {Arturo:"🧔🏻",Melissa:"👩🏻",Majo:"👩🏽",Ricky:"👩🏼"};
const loaded = {};
let allData = null;

// Countdown
function updateCountdown() {
  const start = new Date("2026-04-01");
  const end = new Date("2026-05-26");
  const now = new Date();
  if (now < start) {
    const d = Math.ceil((start - now) / 864e5);
    document.getElementById("countdown-text").textContent = `Arranca en ${d} día${d!==1?"s":""}`;
  } else if (now <= end) {
    const d = Math.ceil((end - now) / 864e5);
    document.getElementById("countdown-text").textContent = `${d} día${d!==1?"s":""} restantes`;
  } else {
    document.getElementById("countdown-text").textContent = "¡Reto terminado!";
  }
}
updateCountdown();

// Tabs
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    const name = tab.dataset.view;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("view-"+name).classList.add("active");
    if (!loaded[name]) { loadView(name); loaded[name] = true; }
  });
});

async function fetchData() {
  if (allData) return allData;
  const res = await fetch(API);
  allData = await res.json();
  return allData;
}

async function loadView(name) {
  try {
    if (name === "marcador") {
      const data = await fetchData();
      const maxPts = Math.max(...data.map(p => p.puntos), 1);
      const html = data.map((p,i) => {
        const avg = p.dias > 0 ? (p.puntos/p.dias).toFixed(1) : "0.0";
        const pct = Math.round(p.puntos/maxPts*100);
        return `<div class="player">
          <div class="rank-badge rank-${i+1}">${MEDALS[i]}</div>
          <div class="player-info">
            <div class="player-name">${p.nombre}</div>
            <div class="player-meta">${p.dias} días · ${avg} pts/día</div>
            <div class="progress-bar" style="margin-top:6px"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="player-right">
            <div class="player-pts">${p.puntos}</div>
            <div class="player-pts-label">pts</div>
          </div>
        </div>`;
      }).join("");
      document.getElementById("scoreboard-list").innerHTML = html;
    } else {
      const nombre = name.charAt(0).toUpperCase() + name.slice(1);
      const data = await fetchData();
      const p = data.find(x => x.nombre === nombre) || {puntos:0, dias:0};
      const avg = p.dias > 0 ? (p.puntos/p.dias).toFixed(1) : "0.0";

      // Fetch personal detailed data
      const res = await fetch(API + "?persona=" + nombre + "&json=1");
      let rows = [];
      try { rows = await res.json(); } catch(e) {}

      // Streak calc from rows
      const diasActivos = [...new Set(rows.filter(r=>r.total>0).map(r=>r.fecha))].sort();
      let rachaActual = 0;
      const today = new Date().toISOString().split("T")[0];
      for (let i = diasActivos.length-1; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate()-(diasActivos.length-1-i));
        if (diasActivos[i] === d.toISOString().split("T")[0]) rachaActual++;
        else break;
      }

      const logRows = rows.slice(-7).reverse().map(r => `
        <tr>
          <td>${r.fecha||""}</td>
          <td style="color:#666">${(r.minutos||"").replace(/\(.*\)/,"").trim()}</td>
          <td><span class="pts-pill">${r.total}</span></td>
        </tr>`).join("");

      document.getElementById("view-"+name).innerHTML = `
        <div class="persona-header">
          <div class="persona-avatar">${AVATARS[nombre]||"🦛"}</div>
          <div>
            <div class="persona-name">${nombre}</div>
            <div class="persona-sub">Reto Hipopotitos 2026</div>
          </div>
        </div>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-num">${p.puntos}</div><div class="stat-label">Puntos totales</div></div>
          <div class="stat-card"><div class="stat-num">${p.dias}</div><div class="stat-label">Días activos</div></div>
          <div class="stat-card"><div class="stat-num">${avg}</div><div class="stat-label">Promedio / día</div></div>
          <div class="stat-card"><div class="stat-num">${rachaActual}🔥</div><div class="stat-label">Racha actual</div></div>
        </div>
        <div class="card-block">
          <div class="block-title">Últimos registros</div>
          ${logRows ? `<table class="log-table"><thead><tr><th>Fecha</th><th>Actividad</th><th>Pts</th></tr></thead><tbody>${logRows}</tbody></table>` 
          : `<div class="empty"><div class="empty-icon">💪</div><p>Sin registros aún.<br>¡El 1 de abril arrancamos!</p></div>`}
        </div>
        <p class="footer-note">Clawdio 🦞 · Actualizado en tiempo real</p>`;
    }
  } catch(e) {
    document.getElementById("view-"+name).innerHTML = `<div class="empty"><div class="empty-icon">😕</div><p>Error al cargar datos</p></div>`;
  }
}

// Initial load
loadView("marcador");
loaded["marcador"] = true;
</script>
</body>
</html>
