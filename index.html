<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reto Hipopotitos 🦛</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Reto 🦛">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--purple:#8046dc;--light:#f5f5f7;--white:#fff;--text:#1d1d1f;--sub:#666}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--light);color:var(--text);min-height:100vh}

  /* Header */
  .header{background:var(--purple);color:white;padding:28px 20px 24px;text-align:center}
  .header .hippo{font-size:52px;line-height:1}
  .header h1{font-size:24px;font-weight:700;margin-top:8px}
  .header p{opacity:.8;font-size:13px;margin-top:4px}

  /* Nav tabs */
  .tabs{display:flex;background:var(--purple);padding:0 16px 16px;gap:8px;overflow-x:auto}
  .tab{background:rgba(255,255,255,.15);color:white;border:none;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;white-space:nowrap;font-weight:500;transition:.2s}
  .tab.active,.tab:hover{background:rgba(255,255,255,.9);color:var(--purple)}

  /* Content */
  .content{padding:16px;max-width:480px;margin:0 auto}
  .view{display:none}.view.active{display:block}

  /* Cards grid */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .card{background:white;border-radius:16px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .card .num{font-size:34px;font-weight:700;color:var(--purple)}
  .card .label{font-size:11px;color:var(--sub);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

  /* Scoreboard */
  .scoreboard{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
  .scoreboard h2{font-size:14px;font-weight:600;padding:14px 16px;border-bottom:1px solid #f0f0f0;color:#444}
  .player{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f7f7f7;gap:12px}
  .player:last-child{border-bottom:none}
  .rank{font-size:20px;width:32px;text-align:center}
  .player-name{flex:1;font-weight:600;font-size:15px}
  .player-pts{font-size:22px;font-weight:700;color:var(--purple)}
  .player-sub{font-size:11px;color:var(--sub)}

  /* Log button */
  .log-btn{display:block;background:var(--purple);color:white;text-align:center;padding:16px;border-radius:16px;font-size:16px;font-weight:600;text-decoration:none;margin-bottom:16px;box-shadow:0 4px 12px rgba(128,70,220,.35)}
  .log-btn:hover{opacity:.9}

  /* Personal table */
  .section{background:white;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:16px}
  .section h2{font-size:14px;font-weight:600;padding:14px 16px;border-bottom:1px solid #f0f0f0;color:#444}
  table{width:100%;border-collapse:collapse}
  td,th{padding:11px 16px;font-size:13px;border-bottom:1px solid #f7f7f7;text-align:left}
  th{font-weight:600;color:var(--sub);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  tr:last-child td{border-bottom:none}
  .empty{text-align:center;padding:32px;color:var(--sub);font-size:14px}

  /* Footer */
  .footer{text-align:center;padding:24px 16px;color:var(--sub);font-size:12px}
  
  /* Loading */
  .loading{text-align:center;padding:40px;color:var(--sub)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{display:inline-block;width:24px;height:24px;border:2px solid #ddd;border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
</style>
</head>
<body>

<div class="header">
  <div class="hippo">🦛</div>
  <h1>Reto Hipopotitos</h1>
  <p>1 abr – 26 may 2026</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="showView('marcador')">🏆 Marcador</button>
  <button class="tab" onclick="showView('arturo')">Arturo</button>
  <button class="tab" onclick="showView('melissa')">Melissa</button>
  <button class="tab" onclick="showView('majo')">Majo</button>
  <button class="tab" onclick="showView('ricky')">Ricky</button>
</div>

<div class="content">

  <!-- MARCADOR GENERAL -->
  <div class="view active" id="view-marcador">
    <a class="log-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSdrtS6kJVcXCTSLwpZysF1rinI-y1htqxG53cIUCZ3Hpw1hjg/viewform" target="_blank">
      ✏️ Loggear mi día de hoy
    </a>
    <div class="scoreboard">
      <h2>Clasificación general</h2>
      <div id="scoreboard-list"><div class="loading"><div class="spinner"></div><br>Cargando...</div></div>
    </div>
    <div class="footer">Actualizado en tiempo real · Clawdio 🦞</div>
  </div>

  <!-- DASHBOARDS PERSONALES -->
  <div class="view" id="view-arturo"><div id="dash-arturo" class="loading"><div class="spinner"></div><br>Cargando...</div></div>
  <div class="view" id="view-melissa"><div id="dash-melissa" class="loading"><div class="spinner"></div><br>Cargando...</div></div>
  <div class="view" id="view-majo"><div id="dash-majo" class="loading"><div class="spinner"></div><br>Cargando...</div></div>
  <div class="view" id="view-ricky"><div id="dash-ricky" class="loading"><div class="spinner"></div><br>Cargando...</div></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyXa83GLxZbj35OoaCpEZN-573Bn1Dc9ZoC87ytIwU0pfI2CZd_v-StXmThOC_x75x6Zg/exec";
const MEDALS = ["🥇","🥈","🥉","4️⃣"];
const loaded = {};

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  event.target.classList.add('active');
  if (!loaded[name]) { loadView(name); loaded[name] = true; }
}

async function loadView(name) {
  if (name === 'marcador') {
    try {
      const res = await fetch(API);
      const data = await res.json();
      const html = data.map((p,i) => `
        <div class="player">
          <div class="rank">${MEDALS[i]||'  '}</div>
          <div style="flex:1">
            <div class="player-name">${p.nombre}</div>
            <div class="player-sub">${p.dias} días activos · ${p.dias>0?(p.puntos/p.dias).toFixed(1):0} pts/día</div>
          </div>
          <div class="player-pts">${p.puntos}</div>
        </div>`).join('');
      document.getElementById('scoreboard-list').innerHTML = html;
    } catch(e) {
      document.getElementById('scoreboard-list').innerHTML = '<div class="empty">Error al cargar 😕</div>';
    }
  } else {
    const nombre = name.charAt(0).toUpperCase() + name.slice(1);
    try {
      const res = await fetch(API + '?persona=' + nombre);
      const html = await res.text();
      // Extract body content from the Apps Script HTML
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const body = doc.body.innerHTML;
      document.getElementById('dash-'+name).outerHTML = `<div id="dash-${name}">${body}</div>`;
    } catch(e) {
      document.getElementById('dash-'+name).innerHTML = '<div class="empty">Error al cargar 😕</div>';
    }
  }
}

// Load initial view
loadView('marcador');
loaded['marcador'] = true;
</script>

</body>
</html>
